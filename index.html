<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Test Kamera & Hand Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>
    <video id="video" width="640" height="480" style="display:none" playsinline></video>
    <canvas id="output" width="640" height="auto"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output');
        const canvasCtx = canvasElement.getContext('2d');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        // hands.onResults((results) => {
        //     canvasCtx.save();
        //     canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        //     canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        //     if (results.multiHandLandmarks) {
        //         for (const landmarks of results.multiHandLandmarks) {
        //             drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 2 });
        //             drawLandmarks(canvasCtx, landmarks, { color: '#FF0000', lineWidth: 1 });
        //         }
        //     }
        //     canvasCtx.restore();
        // });
        hands.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 1 });
                    drawLandmarks(canvasCtx, landmarks, { color: '#FF0000', lineWidth: 1 });

                    // 🖐️ Warna pink ke kuku telunjuk
                    const p6 = landmarks[6];
                    const p7 = landmarks[7];
                    const p8 = landmarks[8];

                    const x6 = p6.x * canvasElement.width;
                    const y6 = p6.y * canvasElement.height;
                    const x7 = p7.x * canvasElement.width;
                    const y7 = p7.y * canvasElement.height;
                    const x8 = p8.x * canvasElement.width;
                    const y8 = p8.y * canvasElement.height;

                    canvasCtx.beginPath();
                    canvasCtx.moveTo(x6, y6);
                    canvasCtx.lineTo(x7, y7);
                    canvasCtx.lineTo(x8, y8);
                    canvasCtx.closePath();
                    canvasCtx.fillStyle = 'rgba(255, 105, 180, 0.8)'; // hotpink semi transparan
                    canvasCtx.fill();
                }
            }

            canvasCtx.restore();
        });

        // const camera = new Camera(videoElement, {
        //     onFrame: async () => {
        //         await hands.send({ image: videoElement });
        //     },
        //     width: 640,
        //     height: 480,
        // });
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480,
            facingMode: { exact: "environment" }, // 🔁 Kamera belakang
        });
        camera.start();
    </script>
</body>

</html>
